# Edge API gateway — routes the SPA and the public REST/SSE API on a single origin.
#
#   http://localhost:8080  → client SPA (/) + REST/SSE API (/api/v1/...)   [app]
#   http://localhost:8081  → admin SPA (/)  + REST API (/api/v1/...)       [admin]
#
# Serving the SPA and the API from one origin avoids CORS and keeps JWT cookies
# / EventSource(withCredentials) working, exactly like the prod edge.

worker_processes auto;
events { worker_connections 1024; }

http {
    # Docker's embedded DNS — lets nginx (re)resolve service names at runtime so
    # it boots even if a backend container restarts.
    resolver RESOLVER_PLACEHOLDER valid=10s ipv6=off;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";

    client_max_body_size 100m;

    # ── REST routes shared by both the app and admin entrypoints ───────────────
    # PathPrefix is NOT stripped (services expect the full /api/v1/<svc>/... path),
    # so we append $request_uri verbatim.
    map $uri $api_backend {
        default                          "";
        "~^/api/v1/admin-auth/"          "admin-auth";
        # Standalone ai-settings owns the whole prefix: the admin SPA expects its
        # response shapes (change_log, tenant-overrides, providers), and the
        # runtime AI-config consumers read ITS database — admin-auth's legacy
        # copy of these handlers writes to a table nobody reads.
        "~^/api/v1/ai-settings/"         "ai-settings";
        # Admin-console REST split across services (order matters — quality before
        # the generic admin/ → billing catch-all). admin-auth/ above is distinct.
        "~^/api/v1/admin/quality"        "ai-analysis";
        "~^/api/v1/admin/"               "billing";
        "~^/api/v1/ai/"                  "ai-analysis";
        # Public, unauthenticated read-only share reports. These live on the
        # service app ROOT (outside the /api/v1/<svc> auth groups), so the SPA
        # fetches them by bare prefix — mirror prod's Traefik public-ingress.
        #   /r/:token  → /public/reviews/:token      (ai-analysis)
        #   /docs/:token → /public/docs/:token       (ai-analysis)
        #   /tr/:token → /public/qa/launches/:token  (qa-hub)
        "~^/public/reviews/"             "ai-analysis";
        "~^/public/docs/"                "ai-analysis";
        "~^/public/qa/launches/"         "qa-hub";
        "~^/api/v1/auth/"                "auth";
        "~^/api/v1/billing/"             "billing";
        "~^/api/v1/public/status"        "delivery-ops";
        "~^/api/v1/delivery-ops/"        "delivery-ops";
        "~^/api/v1/dev-jobs/"            "dev-jobs";
        "~^/api/v1/platform/"            "platform";
        "~^/api/v1/qa/"                  "qa-hub";
        "~^/api/v1/security/"            "security";
        "~^/api/v1/tasks/"               "task-tracker";
    }

    # ── App entrypoint (localhost:8080) ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # REST microservices by path.
        location ~ ^/api/v1/(admin-auth|admin|ai-settings|ai|auth|billing|public/status|delivery-ops|dev-jobs|platform|qa|security|tasks) {
            proxy_pass http://$api_backend.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }

        # SSE realtime streams → realtime-gateway. Disable buffering, long timeout.
        location /api/v1/realtime/ {
            set $rt realtime-gateway;
            proxy_pass http://$rt.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding off;
        }

        # SAML SSO → auth.
        location /sso/ {
            set $auth auth;
            proxy_pass http://$auth.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }

        # Stripe webhook (exact) before the generic /webhooks/ prefix.
        location = /webhooks/stripe {
            set $billing billing;
            proxy_pass http://$billing.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }
        # On-call alert webhook (PagerDuty/Opsgenie → incident ingest). HMAC-auth,
        # no JWT. Lives on the ai-analysis app root, so split it out of the generic
        # /webhooks/ → webhook-ingestor catch-all (longer prefix wins in nginx).
        location /webhooks/oncall/ {
            set $oc ai-analysis;
            proxy_pass http://$oc.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }
        location /webhooks/ {
            set $wh webhook-ingestor;
            proxy_pass http://$wh.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }

        # Public, unauthenticated read-only report share links. Registered on the
        # service app root (NOT under /api/v1/...), so they must be routed by
        # their bare prefix — otherwise they fall through to the SPA fallback and
        # the report fetch gets index.html ("Could not load this report").
        location ~ ^/public/(reviews|docs|qa/launches)/ {
            proxy_pass http://$api_backend.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }

        # Everything else → client SPA (its own nginx serves index.html fallback).
        location / {
            set $fe frontend;
            proxy_pass http://$fe.DNSSUFFIX_PLACEHOLDER:80$request_uri;
        }
    }

    # ── Landing / sign-in entrypoint (localhost:8082) ───────────────────────────
    # The dashboard bounces unauthenticated users to LANDING_URL/sign-in; the
    # landing app logs in via /api/v1/auth/login (same origin → no CORS) and hands
    # the JWT back to the dashboard at :8080/auth/handoff?token=…
    server {
        listen 82;
        server_name _;

        location ~ ^/api/v1/(admin-auth|admin|ai-settings|ai|auth|billing|public/status|delivery-ops|dev-jobs|platform|qa|security|tasks) {
            proxy_pass http://$api_backend.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }
        location /sso/ {
            set $auth auth;
            proxy_pass http://$auth.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }
        location / {
            set $land frontend-landing;
            proxy_pass http://$land.DNSSUFFIX_PLACEHOLDER:80$request_uri;
        }
    }

    # ── Admin entrypoint (localhost:8081) ──────────────────────────────────────
    server {
        listen 81;
        server_name _;

        location ~ ^/api/v1/(admin-auth|admin|ai-settings|ai|auth|billing|public/status|delivery-ops|dev-jobs|platform|qa|security|tasks) {
            proxy_pass http://$api_backend.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }
        location /api/v1/realtime/ {
            set $rt realtime-gateway;
            proxy_pass http://$rt.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }
        location /sso/ {
            set $auth auth;
            proxy_pass http://$auth.DNSSUFFIX_PLACEHOLDER:8000$request_uri;
        }

        location / {
            set $adm admin-frontend;
            proxy_pass http://$adm.DNSSUFFIX_PLACEHOLDER:80$request_uri;
        }
    }
}
