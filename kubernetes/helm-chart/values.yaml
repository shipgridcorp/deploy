# ShipGrid on-prem umbrella chart — default values.
# Override with values-onprem.yaml (see that file) and --set-file for secrets.

global:
  # Image registry that ships the ShipGrid service images.
  #  • Default = the vendor release registry. Pull requires a per-client,
  #    pull-only robot credential — create it as an imagePullSecret (see README).
  #  • Air-gap / policy: mirror the images into your own registry and point this
  #    at it, e.g. registry: harbor.internal.example.ru/shipgrid
  registry: registry.shipgrid.app/shipgrid
  # Pull secret(s) for the registry above. Create one with the credentials you
  # were issued:  kubectl -n <ns> create secret docker-registry regcred \
  #   --docker-server=registry.shipgrid.app --docker-username='robot$<client>' \
  #   --docker-password=<token>
  # then list it here:  imagePullSecrets: [ { name: regcred } ]
  imagePullSecrets: []
  # Shared HMAC secret for internal service-to-service auth. CHANGE for production.
  internalAuthSecret: "15b551bc939a7f55f83bfc14d419afa2a84ec72af0011ae717558662a0405fed"

# ── Shared secrets ────────────────────────────────────────────────────────────
# Injected into EVERY backend pod via `envFrom` (Secret shipgrid-secrets). Each
# service's config resolves these env vars when the matching field is absent
# from its config file — so secrets live here, not in ConfigMaps.
# Defaults are shared dev values — OVERRIDE for production (own values file /
# --set / SealedSecrets / External Secrets). See "Production hardening" in README.
secrets:
  jwtSecret: "local-dev-jwt-secret-please-change-0123456789"
  encryptionKey: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
  redisPassword: "shipgridredis"
  neo4jPassword: "shipgridneo4j"
  qdrantApiKey: ""
  # gate is the one service that consumes a full Redis URL (others compose
  # REDIS_ADDR + REDIS_PASSWORD themselves). Left empty, the chart derives it
  # from redisPassword above (redis://:<redisPassword>@redis:6379/0) — so
  # rotating redisPassword alone keeps gate in sync automatically. Only set
  # this if gate's Redis is NOT the bare in-namespace `redis` (e.g. an
  # external managed Redis at a different host/port).
  redisURL: ""
  # Per-service DATABASE_URL is generated from `services.<name>.db` +
  # `infra.postgres.auth` (bundled postgres). For managed/external DBs,
  # override per service via services.<name>.env.DATABASE_URL.

# ── Site URLs ─────────────────────────────────────────────────────────────────
# Non-secret, install-specific. Injected into every pod via ConfigMap
# shipgrid-config (envFrom). Empty → services fall back to localhost defaults
# (deep links / SSO ACS only; the API still works). Set to your public origins.
site:
  publicAppURL: ""   # PUBLIC_APP_URL  — client dashboard origin (e.g. https://shipgrid.example.ru)
  adminAppURL: ""    # ADMIN_APP_URL   — admin console origin
  spBaseURL: ""      # SP_BASE_URL     — SAML SP base (usually = publicAppURL)

# ── First admin bootstrap ───────────────────────────────────────────────────────
# Set BOTH adminBootstrap.email and adminBootstrap.password to seed the first
# admin-console user. A post-install/upgrade hook Job (templates/admin-seed.yaml)
# seeds/resets the admin to THIS password deterministically (bcrypt via pgcrypto),
# so the first admin is set fully from values — the password is NEVER written to
# the log. Idempotent: re-running upserts the same admin. Rotate after login.
#
# A password is REQUIRED: with email set but password empty, the Job does not run
# and no admin is created (there is no auto-generated temp-password fallback).
#
# The password is install-specific: put it in your secret values file / --set /
# a SealedSecret, NOT in git.
adminBootstrap:
  email: ""            # first admin-console email
  password: ""         # required — the hook Job seeds this exact password
  forcePasswordChange: false   # true → admin must change the seeded password on first login
  # DB the seed Job connects to. Defaults match the bundled postgres; point at
  # your managed admin-auth database when infra.postgres.enabled=false.
  db:
    host: postgres
    port: 5432
    name: shipgrid_admin_auth
    user: shipgrid
    password: shipgrid   # = infra.postgres.auth.password; override for managed DB

# Defaults applied to every service (per-service blocks override via
# services.<name>.{resources,probes,nodeSelector,tolerations,affinity}).
defaults:
  port: 8000
  replicas: 1
  configMountPath: /app/config
  imagePullPolicy: IfNotPresent
  # Extra env for every backend pod (name: value).
  env: {}
  # Baseline per-service budget sized for the standard 26-service footprint on
  # a 16 vCPU / 32 GB PoC node or the 16–24 vCPU / 64 GB production profile.
  # Heavier services (e.g. security) override per-service below.
  resources:
    requests: { cpu: 100m, memory: 192Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # Every service ships /healthz (liveness) + /readyz (dependency-aware
  # readiness) except gate (/health + /readiness — overridden on its service
  # block below). Generous thresholds tolerate slow starts (self-migration on
  # boot) without false-restarting a healthy pod.
  probes:
    liveness:  { path: /healthz, initialDelaySeconds: 20, periodSeconds: 15, timeoutSeconds: 5, failureThreshold: 6 }
    readiness: { path: /readyz,  initialDelaySeconds: 5,  periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }
  # maxUnavailable:1 is a no-op at replicas:1 (voluntary disruption always
  # allowed to drain the single pod) and protects real availability once a
  # service is scaled past 1 (e.g. indexing's replicas:2).
  pdb:
    enabled: true
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Observability ─────────────────────────────────────────────────────────────
# Every backend service exposes Prometheus metrics on /metrics and emits OTLP
# traces (each response carries X-Trace-Id for end-to-end correlation). Two ways
# to consume them:
#   • Bundle    — set monitoring.enabled=true to install Prometheus + Grafana
#                 (with the ShipGrid dashboards) + Jaeger all-in-one in-cluster.
#   • Bring-your-own — leave monitoring.enabled=false, keep scrapeAnnotations on
#                 so your own Prometheus discovers the pods, and point
#                 tracing.otlpEndpoint at your own collector / Jaeger.
# These settings map 1:1 to the admin console's Observability page; changing
# them takes effect on the next pod restart (rollout restart / helm upgrade).
observability:
  tracing:
    enabled: true
    # OTLP endpoint for traces. Empty + monitoring.enabled → the bundled Jaeger
    # (http://jaeger:4318). For BYO, set your collector, e.g.
    # http://otel-collector.observability:4318 or https://tempo.example.ru
    otlpEndpoint: ""
    protocol: http        # http | grpc
    headers: ""           # "key=value,key2=value2" — auth token for a protected collector
    insecure: ""          # "", "true", "false" (default derived from https:// scheme)
    sampleRatio: ""       # "" = sample all; e.g. "0.1" = 10% head sampling
    errorOnly: false      # true → export only traces that contain an error
    disabledServices: ""  # comma list to exclude, e.g. "indexing,realtime-gateway"
    redactBodies: false   # true → strip request/response bodies from spans (PII)
  monitoring:
    enabled: false        # bundle Prometheus + Grafana + Jaeger all-in-one
    scrapeAnnotations: true  # add prometheus.io/scrape so any Prometheus finds the pods
    prometheus:
      image: prom/prometheus:v2.54.1
      retention: 7d
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 1Gi }
    grafana:
      image: grafana/grafana:11.2.0
      # Change for production; the admin user is `admin`.
      adminPassword: admin
      # Expose Grafana via the chart ingress at this host (empty = ClusterIP only).
      host: ""
      resources:
        requests: { cpu: 50m, memory: 128Mi }
        limits:   { cpu: 300m, memory: 512Mi }
    jaeger:
      enabled: true
      image: jaegertracing/all-in-one:1.60
      # Expose the Jaeger UI via the chart ingress at this host (empty = ClusterIP only).
      host: ""
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 1Gi }

# ── RU LLM policy ─────────────────────────────────────────────────────────────
# Block foreign LLM providers stack-wide (152-ФЗ). The gate config also enforces
# this; a gate image built with `-tags ru` is the binary-level guarantee.
llm:
  blockForeignProviders: true
  yandex:
    apiKey: ""
    folderId: ""
    baseURL: ""
  gigachat:
    authKey: ""
    scope: "GIGACHAT_API_PERS"
    caFile: ""   # path to mounted Russian Trusted Root CA
  # Foreign providers — used only when blockForeignProviders=false (non-RU
  # deployments).
  openai:
    apiKey: ""
    baseURL: ""   # blank → api.openai.com; set for Azure/OpenAI-compatible
  anthropic:
    apiKey: ""
    baseURL: ""
  # Self-hosted OpenAI-compatible model (vLLM/Ollama/TGI) — runs inside your
  # perimeter regardless of blockForeignProviders. Set baseURL to the endpoint
  # and add model→provider routes under model_aliases in configs/gate/config.yaml
  # so requests for your model names reach it.
  local:
    apiKey: ""
    baseURL: ""
  # Separate self-hosted endpoint for EMBEDDINGS (repo indexing / RAG). Keep the
  # embedder off the chat inference server when one node can't hold both (a 7B
  # chat model + the embedder thrash/OOM on a small node). Blank baseURL → the
  # gate's `localembed` provider falls back to `local`.
  localEmbed:
    apiKey: ""
    baseURL: ""
  # Additional self-hosted models — one per purpose, each its own model on its own
  # URL (same OpenAI-compatible interface). The gate registers a generic
  # openai-compatible provider for every entry; list the model name(s) each serves
  # under `models` so requests for them route to that URL. Then assign a model to a
  # feature in the admin AI Settings. Example:
  #   localProviders:
  #     chatbig:   { baseURL: "http://vllm-qwen32b:8000/v1",  apiKey: "x", models: ["qwen2.5-32b"] }
  #     security:  { baseURL: "http://vllm-seclm:8000/v1",    apiKey: "x", models: ["sec-model-v1"] }
  #     reasoning: { baseURL: "http://vllm-deepseek:8000/v1", apiKey: "x", models: ["deepseek-r1"] }
  # No template edits needed — add an entry here and its provider + model routing
  # + env are generated. (`local` and `localEmbed` above are the built-in two.)
  localProviders: {}
  mockEnabled: true   # set false once a real LLM is configured

# ── Model selection ─────────────────────────────────────────────────────────────
# Which model serves each duty (chat / light chat / embeddings) is assigned
# ONLY in the admin console: AI Settings → Providers → tag a model with the
# role. Applied to all services live, survives upgrades, no chart values
# involved. Embedding vector dimensions are discovered from the model
# automatically. Switching the embeddings model rebuilds vector collections —
# re-index repositories afterwards (the console warns before the switch).

# ── On-prem license (Ed25519) ─────────────────────────────────────────────────
# EVERY backend service verifies the signed license at startup against the public
# key embedded in the image. A missing/invalid license fails closed; a valid-but-
# expired one degrades to restricted (read-only) mode after grace, not a stop.
# billing /readyz exposes the license status.
license:
  enabled: true
  # Provide the signed license at install:  --set-file license.file=license.signed.json
  file: ""
  mountPath: /etc/shipgrid/license.json
  # Advanced: override the embedded trust-root public key. Only takes effect on
  # unsigned/dev images (ignored when a key is baked in). Leave empty in prod.
  publicKeyHex: ""

# ── Egress lockdown ───────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  # When enabled, default-deny egress except DNS + the CIDRs below (RF LLM, etc.).
  allowedEgressCIDRs: []

# ── Optional pentest infrastructure (DAST + blind/OOB) ─────────────────────────
# The pentest ENGINE itself ships inside the `security` service. These two
# OPTIONAL helpers add live-target testing:
#  • zap — OWASP ZAP daemon for DAST (active web scan). Self-contained; when
#    enabled the security service auto-discovers it at http://zap:8080, no extra
#    wiring. Safe for an isolated contour.
#  • oob — self-hosted interactsh server for blind-vuln detection (blind SSRF/
#    RCE/XXE/SQLi via out-of-band callbacks). REQUIRES site-specific setup: a
#    public IP + DNS delegation of `oob.domain` to this server (interactsh is an
#    authoritative DNS server). NOT usable in a fully air-gapped perimeter —
#    leave disabled there; the rest of the pentest engine still runs.
pentest:
  zap:
    enabled: false
    image: ghcr.io/zaproxy/zaproxy:stable
    # api.disablekey=true → no API key needed; security reaches it in-cluster only.
    resources:
      requests: { cpu: 250m, memory: 768Mi }
      limits:   { cpu: "2",  memory: 2Gi }
  oob:
    enabled: false
    image: projectdiscovery/interactsh-server:latest
    # The public subdomain delegated (NS/glue at your registrar) to this server,
    # and the public IP interactsh returns in its DNS answers (usually the LB IP).
    domain: ""          # e.g. oob.company.ru
    publicIP: ""        # e.g. the reserved LoadBalancer IP
    # Must receive raw DNS(53)+HTTP(80) from the public internet — a plain
    # LoadBalancer (not the edge ingress, which can't carry UDP/53).
    serviceType: LoadBalancer
    resources:
      requests: { cpu: 50m,  memory: 96Mi }
      limits:   { cpu: 300m, memory: 256Mi }

# ── Edge gateway (nginx) — one origin for SPA + API ───────────────────────────
gateway:
  enabled: true
  image: nginx:1.25-alpine
  replicas: 1
  serviceType: ClusterIP
  # CoreDNS ClusterIP — REQUIRED for the variable proxy_pass to resolve backends.
  # Find it: kubectl -n kube-system get svc kube-dns -o jsonpath='{.spec.clusterIP}'
  resolver: "10.96.0.10"

# ── External access ───────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  # e.g. cert-manager: { cert-manager.io/cluster-issuer: letsencrypt }
  annotations: {}
  app:     { host: "shipgrid.example.ru" }
  admin:   { host: "admin.shipgrid.example.ru" }
  landing: { host: "" }   # empty → no landing rule
  tls:
    enabled: false
    secretName: shipgrid-tls

# ── SPA frontends ─────────────────────────────────────────────────────────────
# :onprem-<tag> images (same-origin API base) — host-agnostic behind the
# gateway. Enable with --set frontends.enabled=true. image = {global.registry}
# /{repo}:{tag} unless `image` is set explicitly.
frontends:
  enabled: false
  items:
    frontend:         { repo: frontend,         tag: "onprem-v1.540.0", port: 80 }  # client dashboard
    admin-frontend:   { repo: admin-frontend,   tag: "onprem-v1.58.0",  port: 80 }
    frontend-landing: { repo: frontend-landing, tag: "onprem-v1.51.0",  port: 80 }

# ── Backend services ──────────────────────────────────────────────────────────
# image defaults to {global.registry}/{image}:{tag}; tags are the tested
# release set. gate uses the llm-gateway image.
#
# `db: <name>` marks a service that owns a logical database: the chart injects
# DATABASE_URL=postgres://<infra.postgres.auth>@postgres:5432/<name> for it
# (matching the bundled postgres, which creates every listed database on first
# init). For a managed Postgres override services.<name>.env.DATABASE_URL —
# an explicit env: entry always wins over the generated one.
#
# `config: true` mounts a ConfigMap from configs/<name>/config.yaml. With the
# config loader (file → env → default), services boot from in-cluster defaults
# + the shared secrets/site env, so only `gate`, `security` and the security
# split-workers mount one by default. configs/<name>/config.yaml files exist
# for every service as commented examples — to override a default, uncomment
# only the changed keys and flip that service's `config: true`.
services:
  auth:              { image: auth,              tag: v1.42.1,   config: false, db: shipgrid_auth }
  admin-auth:        { image: admin-auth,        tag: v1.24.0,   config: false, db: shipgrid_admin_auth }
  # platform reaches the connector over gRPC (repo listing / integration
  # checks); connector:9090 is already platform's code default (see
  # connector.extraPorts below).
  platform:          { image: platform,          tag: v1.61.0,   config: false, db: shipgrid_platform }
  billing:           { image: billing,           tag: v1.47.0,   config: false, db: shipgrid_billing, license: true }
  # gate is the one service off the /healthz+/readyz convention (/health +
  # /readiness instead).
  gate:
    image: llm-gateway
    tag: v1.33.0
    config: true
    db: shipgrid_gate
    probes:
      liveness:  { path: /health }
      readiness: { path: /readiness }
  connector:         { image: connector,         tag: v1.25.1,   config: false, extraPorts: [ { name: grpc, port: 9090 } ] }
  # replicas: 2 — each pod runs one repo pipeline worker (claims per-repo jobs via
  # FOR UPDATE SKIP LOCKED), so >1 replica indexes repositories in parallel.
  indexing:          { image: indexing,          tag: v1.66.1,   config: false, db: shipgrid_indexing, replicas: 2 }
  # The six extracted security-platform microservice URLs are wired via
  # configs/security/config.yaml, not env — see that file. Unset (delete a
  # line there) = embedded path for that domain.
  # Heavier than the default budget: the security service shells out to bundled
  # scanners (semgrep, checkov, trivy, gitleaks, …) that use ~1–2Gi during real
  # repo scans. Note: /readyz runs a live scan per tool; on CPU-constrained
  # nodes the Python scanners can overrun the internal per-scanner timeout and
  # show a degraded /readyz even though the tools scan fine — gate k8s
  # readiness on /healthz there (services.security.probes in your overlay).
  security:
    image: security
    tag: v1.129.1
    config: true
    db: shipgrid_security
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits:   { cpu: "2",  memory: 2Gi }
  ai-analysis:       { image: ai-analysis,       tag: v1.263.0,  config: false, db: shipgrid_ai_analysis }
  ai-settings:       { image: ai-settings,       tag: v0.14.0,    config: false, db: shipgrid_ai_settings }
  review-processor:  { image: review-processor,  tag: v1.56.1,   config: false, db: shipgrid_review_processor }
  webhook-ingestor:  { image: webhook-ingestor,  tag: v1.14.1,   config: false, db: shipgrid_webhook_ingestor }
  notification:      { image: notification,      tag: v1.12.1,    config: false }
  task-tracker:      { image: task-tracker,      tag: v1.53.1,   config: false, db: shipgrid_task_tracker }
  qa-hub:            { image: qa-hub,             tag: v2.44.1,   config: false, db: shipgrid_qa_hub }
  dev-jobs:          { image: dev-jobs,          tag: v0.35.1,   config: false, db: shipgrid_dev_jobs }
  delivery-ops:      { image: delivery-ops,      tag: v1.45.1,   config: false, db: shipgrid_delivery_ops }
  realtime-gateway:  { image: realtime-gateway,  tag: v1.3.0,    config: false }
  automation-runner: { image: automation-runner, tag: v1.4.1,    config: false }
  # Security split-workers. Each owns its own database and self-migrates at
  # startup; `config: true` mounts configs/<name>/config.yaml at CONFIG_PATH,
  # which carries the DB DSN (postgres.dsn) and server.http_port=8000.
  # INTERNAL_AUTH_SECRET is injected as a secret-env by the chart.
  policy-engine:       { image: policy-engine,       tag: v0.7.1, config: true }
  runtime-collector:   { image: runtime-collector,   tag: v0.6.1, config: true }
  k8s-scanner:         { image: k8s-scanner,         tag: v0.6.1, config: true }
  cloud-scanner:       { image: cloud-scanner,       tag: v0.6.1, config: true }
  proof-engine:        { image: proof-engine,        tag: v0.6.1, config: true }
  findings-correlator: { image: findings-correlator, tag: v0.6.1, config: true }

# ── Bundled infra (PoC only). For production use managed services / operators
# and point service configs at their URLs. ────────────────────────────────────
infra:
  postgres:
    enabled: false
    image: pgvector/pgvector:pg16
    storage: 20Gi
    storageClassName: ""   # "" → cluster default StorageClass
    # Internal-only bundled Postgres (not exposed outside the namespace). The
    # user/password feed the generated per-service DATABASE_URL (services.<name>.db)
    # and the split-worker config DSNs — keep them in sync if you change them.
    # For production, point services at your managed DB instead of bundling.
    auth: { user: shipgrid, password: shipgrid }
    # Per-service databases created on first init (each service self-migrates its
    # schema). Must cover every services.<name>.db plus the split-worker DSNs.
    databases:
      - shipgrid_admin_auth
      - shipgrid_ai_analysis
      - shipgrid_ai_settings
      - shipgrid_auth
      - shipgrid_billing
      - shipgrid_delivery_ops
      - shipgrid_dev_jobs
      - shipgrid_gate
      - shipgrid_indexing
      - shipgrid_platform
      - shipgrid_qa_hub
      - shipgrid_review_processor
      - shipgrid_security
      - shipgrid_task_tracker
      - shipgrid_webhook_ingestor
      # security split-workers (each owns its own DB)
      - shipgrid_cloud_scanner
      - shipgrid_policy_engine
      - shipgrid_proof_engine
      - shipgrid_runtime_collector
      - shipgrid_k8s_scanner
      - shipgrid_findings_correlator
  redis:
    enabled: false
    image: redis:7-alpine
  kafka:
    enabled: false
    # Official Apache image, KRaft mode, configured with KAFKA_-prefixed env;
    # data lives in /var/lib/kafka/data — the StatefulSet in templates/infra.yaml
    # is written for that contract.
    image: apache/kafka:4.3.1
    storage: 10Gi
    storageClassName: ""
  neo4j:
    enabled: false
    image: neo4j:5-community
    storage: 10Gi
    storageClassName: ""
  qdrant:
    enabled: false
    # Must stay in step with the services' qdrant client (v1.17.x) — older
    # servers read the dense-vector wire format as empty.
    image: qdrant/qdrant:v1.17.1
    storage: 10Gi
    storageClassName: ""
  clickhouse:
    # LLM gateway usage analytics (admin LLM-usage tab). When enabled, the chart
    # sets gate's CLICKHOUSE_URL and gate auto-migrates the schema.
    enabled: false
    image: clickhouse/clickhouse-server:24.8
    # The 24.x image rejects the default user with an empty password over TCP, so
    # the `default` user gets this password (dev default — rotate for prod).
    password: "shipgridclickhouse"
    storage: 10Gi
    storageClassName: ""
  kroki:
    # Server-side C4/PlantUML diagram rendering. When enabled, ai-analysis's
    # default KROKI_URL=http://kroki:8000 resolves and architecture diagrams
    # render via Kroki instead of the weaker in-app fallback. Single all-in-one
    # container; no persistence needed.
    enabled: false
    image: yuzutech/kroki:0.26.0
