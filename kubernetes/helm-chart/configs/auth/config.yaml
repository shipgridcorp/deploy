# auth — EXAMPLE config override (not deployed by default).
# The service boots from its built-in defaults + the shared secrets/site env;
# a config file is only needed to override specific fields (config loader
# precedence: file → env → default). To enable, set `config: true` on
# services.auth in values.yaml — the chart then mounts this file as a
# ConfigMap at CONFIG_PATH. Keep ONLY the keys you change.
