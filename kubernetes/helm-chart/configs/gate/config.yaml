# gate (llm-gateway) — ONLY the LLM-specific config that cannot be defaulted or
# injected as a flat env var. Everything else (server.port, database.url,
# redis.url, secrets, timeouts, cors…) is resolved by the config loader from
# env + code defaults. block_foreign_providers ← env BLOCK_FOREIGN_LLM (set by
# the chart), mock_provider.enabled ← env MOCK_PROVIDER_ENABLED, provider API
# keys ← env (set by the chart from .Values.llm).
llm_policy:
  # Self-hosted providers allowed inside the perimeter while foreign providers
  # stay blocked (152-ФЗ). local/localembed are pre-allowed: with a blank
  # baseURL they are simply not instantiated.
  allowed_providers:
    - local
    - localembed
{{- range $name, $p := .Values.llm.localProviders }}
    - {{ $name }}
{{- end }}

# Fallback order when a request doesn't pin a provider. Foreign providers
# (openai/anthropic) only instantiate when block_foreign_providers=false
# (BLOCK_FOREIGN_LLM env); in an RF deployment they are blocked and the gate
# falls through to yandexgpt → mock.
fallback_order:
  - local
  - openai
  - anthropic
  - yandexgpt
  - mock

providers:
  # Foreign providers. Blank api_key → not instantiated. Honoured only with
  # block_foreign_providers=false. Keys come from the chart via env.
  openai:
    api_key: ${OPENAI_API_KEY:-}
    base_url: ${OPENAI_BASE_URL:-}
  anthropic:
    api_key: ${ANTHROPIC_API_KEY:-}
    base_url: ${ANTHROPIC_BASE_URL:-}
  # api_key = Yandex Cloud service-account API key (Api-Key auth);
  # project = folder id. Blank → mock-only until real credentials are set.
  # base_url only overrides Yandex Cloud's own endpoint (regional/proxy) — for
  # a self-hosted model use the "local" provider below.
  yandexgpt:
    api_key: ${YANDEX_API_KEY:-}
    project: ${YANDEX_FOLDER_ID:-}
    base_url: ${YANDEX_LLM_BASE_URL:-}
  # Self-hosted OpenAI-compatible endpoint (vLLM/Ollama/TGI): set
  # llm.local.baseURL in values.yaml (→ LOCAL_LLM_BASE_URL). api_key may stay
  # blank if the server needs no auth. Never leaves your perimeter.
  local:
    base_url: ${LOCAL_LLM_BASE_URL:-}
    api_key: ${LOCAL_LLM_API_KEY:-}
    timeout_seconds: 300
  # Separate self-hosted endpoint for EMBEDDINGS (repo indexing / RAG). Kept
  # apart from `local` so a chat model and the embedder can run on different
  # inference servers. Blank base_url → falls back to `local`.
  localembed:
    base_url: ${LOCAL_EMBED_LLM_BASE_URL:-}
    api_key: ${LOCAL_EMBED_LLM_API_KEY:-}
    timeout_seconds: 300
{{- /* Additional self-hosted OpenAI-compatible providers, one per entry in
       .Values.llm.localProviders — each is its own model on its own URL (chat,
       security, reasoning, …), same interface. base_url/api_key arrive as env
       LLM_LOCAL_<NAME>_BASE_URL/_API_KEY (set by the chart from the same map).
       The gate builds a generic openai-compatible client for any custom name. */}}
{{- range $name, $p := .Values.llm.localProviders }}
  {{ $name }}:
    base_url: ${LLM_LOCAL_{{ $name | upper | replace "-" "_" }}_BASE_URL:-}
    api_key: ${LLM_LOCAL_{{ $name | upper | replace "-" "_" }}_API_KEY:-}
    timeout_seconds: {{ $p.timeoutSeconds | default 300 }}
{{- end }}

# Extra model→provider routing: needed when a self-hosted model must coexist
# with cloud vendors (an unknown model name otherwise routes to "openai").
# With a self-hosted model, route your model names — and the common cloud
# default model names the platform features use — to it so every AI feature
# works in-perimeter, e.g.:
#   "qwen2.5-coder:7b": local
#   nomic-embed-text: localembed   # pair with EMBEDDING_MODEL/EMBEDDING_DIM
#   gpt-5-mini: local
#   gpt-4o: local
# Adjust the per-feature model in the admin AI Settings for finer control.
model_aliases:
{{- /* Route each model listed under a llm.localProviders entry to that provider,
       so a request for that model name hits the right URL. Assign the model to a
       feature in the admin AI Settings to actually use it there. */}}
{{- if not .Values.llm.localProviders }} {}{{- end }}
{{- range $name, $p := .Values.llm.localProviders }}
{{- range $m := ($p.models | default list) }}
  {{ $m | quote }}: {{ $name }}
{{- end }}
{{- end }}

# Default model per logical role: services request `auto:<role>` and the gate
# substitutes the model set here. Startup fallbacks only — a role assignment
# made in the admin console (AI Settings → Providers) always overrides these,
# live. The deprecated embedding.model value seeds the embeddings role so
# existing installs keep working after upgrade.
default_models:
{{- $dm := .Values.llm.defaultModels | default dict }}
{{- $embLegacy := .Values.embedding.model | default "" }}
{{- if and (not $dm) (not $embLegacy) }} {}{{- end }}
{{- range $role, $model := $dm }}
  {{ $role | quote }}: {{ $model | quote }}
{{- end }}
{{- if and $embLegacy (not (hasKey $dm "embeddings")) }}
  "embeddings": {{ $embLegacy | quote }}
{{- end }}
