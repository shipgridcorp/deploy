# Site URLs (non-secret, install-specific) injected into every backend pod via
# envFrom. Empty values are ignored by the config loader, which then falls back
# to the in-cluster/localhost default — so this is safe to leave blank for a PoC.
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipgrid-config
  labels:
    {{- include "shipgrid.labels" . | nindent 4 }}
data:
  PUBLIC_APP_URL: {{ .Values.site.publicAppURL | quote }}
  ADMIN_APP_URL: {{ .Values.site.adminAppURL | quote }}
  SP_BASE_URL: {{ .Values.site.spBaseURL | quote }}
  # On-prem license gate (shared/license.Gate runs in EVERY backend service at
  # startup). When LICENSE_ENABLED=true, a service verifies the mounted
  # license.json against the public key embedded in the image. Missing/invalid
  # fails closed; expired degrades to restricted (read-only) mode after grace.
  LICENSE_ENABLED: {{ .Values.license.enabled | quote }}
  LICENSE_FILE: {{ .Values.license.mountPath | quote }}
  # Dev-only override of the embedded key; empty in prod (then it is ignored).
  LICENSE_PUBLIC_KEY: {{ .Values.license.publicKeyHex | quote }}
  # Embeddings (repository indexing / RAG): the model is assigned only in the
  # admin console (AI Settings → Providers, role "embeddings"); services
  # request the logical auto:embeddings name and the gate substitutes the
  # active model. Vector dimensions are discovered from the model at runtime —
  # nothing embedding-related is configured here.
{{- /*
Per-service ConfigMap, emitted only for services with `config: true`. With the
flexible loader (file → env → default) the stack boots from defaults + the shared
secrets/site env, so by default only `gate` ships a ConfigMap (its providers
block). To override a default for any service, drop a configs/<name>/config.yaml
holding ONLY the changed keys and set its `config: true`.
*/ -}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.config }}
{{- $path := printf "configs/%s/config.yaml" $name }}
{{- $content := $.Files.Get $path }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ printf "%s-config" $name }}
  labels:
    {{- include "shipgrid.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $name }}
data:
  config.yaml: |
{{- if $content }}
{{- /* gate's config is rendered through tpl so its local-provider list, aliases
       and allow-list can be generated from .Values.llm.localProviders (add a
       self-hosted model = one values entry, no template edits). Other services'
       configs are emitted verbatim. */}}
{{- if eq $name "gate" }}
{{ tpl $content $ | indent 4 }}
{{- else }}
{{ $content | indent 4 }}
{{- end }}
{{- else }}
    # PLACEHOLDER — configs/{{ $name }}/config.yaml is missing from the chart.
    # Supply one (see the commented examples in configs/) or set
    # services.{{ $name }}.config=false to boot from defaults + env.
    server:
      port: {{ $.Values.defaults.port }}
{{- end }}
{{- end }}
{{- end }}
