apiVersion: v1
kind: Secret
metadata:
  name: internal-auth
  labels:
    {{- include "shipgrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  secret: {{ required "global.internalAuthSecret is required" .Values.global.internalAuthSecret | quote }}
---
# Shared secrets injected into every backend pod via envFrom. The flexible config
# loader (shared/config) reads these env vars for any field left empty by the
# (now minimal/absent) ConfigMaps.
apiVersion: v1
kind: Secret
metadata:
  name: shipgrid-secrets
  labels:
    {{- include "shipgrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  REDIS_URL: {{ .Values.secrets.redisURL | default (printf "redis://:%s@redis:6379/0" .Values.secrets.redisPassword) | quote }}
  NEO4J_PASSWORD: {{ .Values.secrets.neo4jPassword | quote }}
  QDRANT_API_KEY: {{ .Values.secrets.qdrantApiKey | quote }}
{{- if and .Values.license.enabled .Values.license.file }}
---
apiVersion: v1
kind: Secret
metadata:
  name: license
  labels:
    {{- include "shipgrid.labels" . | nindent 4 }}
type: Opaque
stringData:
  license.json: |
{{ .Values.license.file | indent 4 }}
{{- end }}
