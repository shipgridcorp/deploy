# cloud-scanner config, mounted from the cloud-scanner-config config file at CONFIG_PATH.
# Only non-secret, install-specific settings live here; INTERNAL_AUTH_SECRET is
# injected via the shared environment and the LLM/site vars come from the
# shared shipgrid-config directory. The flexible loader fills any omitted key
# from its code default.
server:
  http_port: 8000
# Database credentials for this service's own logical DB on the bundled
# postgres. Override the DSN here (not via a pod env var) to point at an
# external/managed postgres.
postgres:
  dsn: postgres://shipgrid:shipgrid@postgres:5432/shipgrid_cloud_scanner?sslmode=disable
