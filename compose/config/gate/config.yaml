# gate (llm-gateway) — ONLY the LLM-specific config that cannot be defaulted or
# injected as a flat env var. Everything else (server.port, database.url,
# redis.url, security.jwt_secret, internal_auth_secret, proxy/circuit-breaker/
# logger timeouts, cors…) is resolved by the flexible loader from env + code
# defaults. block_foreign_providers ← env BLOCK_FOREIGN_LLM (set by the chart),
# mock_provider.enabled ← env MOCK_PROVIDER_ENABLED, provider API keys ← env.
llm_policy:
  # Add a self-hosted OpenAI-compatible provider name here to allow it inside
  # the perimeter while foreign providers stay blocked (152-ФЗ).
  allowed_providers: []

# Fallback order when a request doesn't pin a provider. Foreign providers
# (openai/anthropic) are listed first but only instantiate when
# block_foreign_providers=false (BLOCK_FOREIGN_LLM env). In an RU build / RU
# deployment they are blocked and the gate falls through to yandexgpt → mock.
fallback_order:
  - openai
  - anthropic
  - yandexgpt
  - mock

providers:
  # Foreign providers. Blank api_key → not instantiated. Used by clients without
  # the 152-ФЗ constraint (block_foreign_providers=false). Keys come from env
  # (OPENAI_API_KEY / ANTHROPIC_API_KEY), injected by the compose file into the gate container.
  openai:
    api_key: ${OPENAI_API_KEY:-}
    base_url: ${OPENAI_BASE_URL:-}
  anthropic:
    api_key: ${ANTHROPIC_API_KEY:-}
    base_url: ${ANTHROPIC_BASE_URL:-}
  # api_key = Yandex Cloud service-account API key (Api-Key auth);
  # project = folder id. Blank → mock-only until real credentials are provisioned.
  # base_url only overrides Yandex Cloud's own endpoint (regional/proxy) — it is
  # NOT the self-hosted-model hook, use the "local" provider below for that.
  yandexgpt:
    api_key: ${YANDEX_API_KEY:-}
    project: ${YANDEX_FOLDER_ID:-}
    base_url: ${YANDEX_LLM_BASE_URL:-}
  # Self-hosted OpenAI-compatible endpoint (vLLM/Ollama/TGI), e.g. LOCAL_LLM_BASE_URL=
  # http://vllm.internal:8000/v1. api_key may stay blank if the server needs no
  # auth. Also add "local" to llm_policy.allowed_providers above — a custom
  # provider name isn't domestic-by-default even though it never leaves your
  # perimeter (152-ФЗ policy can't tell where base_url points). See docs/local-models.md.
  local:
    base_url: ${LOCAL_LLM_BASE_URL:-}
    api_key: ${LOCAL_LLM_API_KEY:-}
    timeout_seconds: 300

# Extra model→provider routing entries: needed when a self-hosted model must
# coexist with cloud vendors (without an alias an unknown model name routes to
# the "openai" provider). See docs/local-models.md.
# model_aliases:
#   qwen3-32b-instruct: local
