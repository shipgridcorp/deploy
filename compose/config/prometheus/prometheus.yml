# ShipGrid on-prem — Prometheus scrape config (single-VM compose stack).
# Every backend service serves Prometheus metrics on :8000/metrics. The metric
# series already carry a `service` label (set by the app), so no relabeling is
# needed for the ShipGrid Grafana dashboards. Bring-your-own Prometheus can copy
# these targets or scrape by the same convention.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: shipgrid
    metrics_path: /metrics
    static_configs:
      - targets:
          - auth:8000
          - admin-auth:8000
          - platform:8000
          - billing:8000
          - gate:8000
          - connector:8000
          - indexing:8000
          - security:8000
          - ai-analysis:8000
          - ai-settings:8000
          - review-processor:8000
          - webhook-ingestor:8000
          - notification:8000
          - task-tracker:8000
          - qa-hub:8000
          - dev-jobs:8000
          - delivery-ops:8000
          - realtime-gateway:8000
          - automation-runner:8000
          - policy-engine:8000
          - runtime-collector:8000
          - k8s-scanner:8000
          - cloud-scanner:8000
          - proof-engine:8000
          - findings-correlator:8000

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
