# ShipGrid on-prem — lean baseline alerts (client-facing). Fire in the
# Prometheus UI (Alerts tab). Wire Alertmanager separately if you want routing
# to email/Telegram/etc.
groups:
  - name: shipgrid-baseline
    rules:
      - alert: ShipGridServiceDown
        expr: up{job="shipgrid"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "ShipGrid target {{ $labels.instance }} is down"
          description: "Prometheus has failed to scrape {{ $labels.instance }} for 2 minutes."

      - alert: ShipGridHighErrorRate
        expr: |
          sum by (service) (rate(devflow_http_requests_total{status=~"5.."}[5m]))
            / clamp_min(sum by (service) (rate(devflow_http_requests_total[5m])), 0.001) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.service }}"
          description: "Over 5% of requests to {{ $labels.service }} returned 5xx for 10 minutes."

      - alert: ShipGridHighRequestLatency
        expr: |
          histogram_quantile(0.95,
            sum by (service, le) (rate(devflow_http_request_duration_seconds_bucket[5m]))) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High request latency on {{ $labels.service }}"
          description: "p95 request latency for {{ $labels.service }} exceeded 2s for 10 minutes."
