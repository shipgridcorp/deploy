# indexing — EXAMPLE config override (not mounted by default).
# The service boots from its built-in defaults + the shared environment in
# docker-compose.yml; a config file is only needed to override specific fields
# (config loader precedence: file → env → default). To enable, mount this
# directory into the container and set CONFIG_PATH, like the gate/security
# services do in docker-compose.yml:
#   volumes: [ ./config/indexing:/app/config:ro ]
#   environment: { CONFIG_PATH: /app/config/config.yaml }
# Keep ONLY the keys you change — everything omitted keeps its default.
